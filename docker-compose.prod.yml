version: "3.9"
services:
  onecerabond:
    image: nginx:alpine
    container_name: onecerabond
    volumes:
      - ./build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - VIRTUAL_HOST=onecerabond.com,www.onecerabond.com
      - LETSENCRYPT_HOST=onecerabond.com,www.onecerabond.com
      - LETSENCRYPT_EMAIL=dshershah@gmail.com
    networks:
      - nginx-proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  nginx-proxy:
    external: true
