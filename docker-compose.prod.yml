version: "3.9"
services:
  onecerabond:
    image: nginx:alpine
    container_name: onecerabond
    volumes:
      - ./build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - VIRTUAL_HOST=onecerabond.com,www.onecerabond.com
      - LETSENCRYPT_HOST=onecerabond.com,www.onecerabond.com
